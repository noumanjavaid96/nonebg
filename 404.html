<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Page not found — East Bridge Global</title>
  <meta name="robots" content="noindex">
  <link rel="icon" href="/assets/img/favicon.svg" type="image/svg+xml">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Manrope:wght@400;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/css/styles.css">
  <style>
    .nf {
      position: relative;
      min-height: 100svh;
      display: grid;
      place-items: center;
      text-align: center;
      padding: var(--gutter);
      overflow: hidden;
    }
    .nf__grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(var(--gridline) 1px, transparent 1px),
        linear-gradient(90deg, var(--gridline) 1px, transparent 1px);
      background-size: 56px 56px;
      -webkit-mask-image: radial-gradient(900px 620px at 50% 45%, #000 40%, transparent 90%);
      mask-image: radial-gradient(900px 620px at 50% 45%, #000 40%, transparent 90%);
    }
    .nf__inner { position: relative; }
    .nf__code {
      font-family: var(--font-display);
      font-weight: 600;
      letter-spacing: -0.03em;
      font-size: clamp(100px, 20vw, 220px);
      line-height: 1;
      color: var(--cobalt);
    }
    .nf h1 { font-size: clamp(24px, 3.4vw, 40px); margin-top: 8px; }
    .nf p { color: var(--muted); margin-top: 14px; }
    .nf .btn { margin-top: 30px; }
  </style>
</head>
<body>
  <main class="nf">
    <div class="nf__grid" aria-hidden="true"></div>
    <div class="nf__inner">
      <p class="nf__code">404</p>
      <h1>This crossing doesn't exist.</h1>
      <p>The page you're looking for has moved on to bigger markets.</p>
      <a class="btn btn--cobalt" href="/">Back to the bridge</a>
    </div>
  </main>
</body>
</html>
